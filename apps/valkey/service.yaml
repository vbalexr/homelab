apiVersion: v1
kind: Service
metadata:
  name: valkey
  labels:
    app: valkey
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for StatefulSet DNS discovery
  selector:
    app: valkey
  ports:
  - name: valkey
    port: 6379
    targetPort: valkey
    protocol: TCP
  publishNotReadyAddresses: true
