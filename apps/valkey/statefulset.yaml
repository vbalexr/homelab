apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
spec:
  serviceName: valkey
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
      
      containers:
      - name: valkey
        image: valkey/valkey:8.0
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: valkey
          containerPort: 6379
          protocol: TCP
        
        env:
        - name: VALKEY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: valkey-secret
              key: password
        
        command:
          - valkey-server
          - --requirepass
          - $(VALKEY_PASSWORD)
          - --appendonly
          - "yes"
          - --save
          - "900 1"
          - --save
          - "300 10"
          - --save
          - "60 10000"
        
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
        
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - valkey-cli -a $VALKEY_PASSWORD ping | grep PONG
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - valkey-cli -a $VALKEY_PASSWORD ping | grep PONG
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        
        volumeMounts:
        - name: valkey-data
          mountPath: /data
        
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
      
  volumeClaimTemplates:
  - metadata:
      name: valkey-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
