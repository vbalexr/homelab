apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
data:
  postgresql.conf: |
    # PostgreSQL Configuration for vchord and pgvector
    
    # Shared preload libraries - REQUIRED for vchord and pgvector
    shared_preload_libraries = 'vector,vchord'
    
    # Performance settings for homelab environment
    # Adjust based on available cluster resources
    max_connections = 200
    shared_buffers = 256MB
    effective_cache_size = 1GB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
