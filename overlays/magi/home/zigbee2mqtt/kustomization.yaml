apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: zigbee2mqtt
  namespace: home

namespace: home

resources:
  - ../../../../apps/zigbee2mqtt
  - pvc.yaml

patches:
  - path: service-patch.yaml
    target:
      kind: Service
      name: zigbee2mqtt

labels:
  - pairs:
      app.kubernetes.io/name: zigbee2mqtt
      app.kubernetes.io/instance: magi
    includeSelectors: true
