apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mosquitto-tls
spec:
  secretName: mosquitto-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - mqtt.vbalex.com  # Change this to your actual domain
  duration: 2160h  # 90 days
  renewBefore: 720h  # 30 days before expiry
