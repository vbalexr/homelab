apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: cert-manager
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      version: v1.20.2
  values:
    crds:
      enabled: true
    serviceAccount:
      create: true
      name: cert-manager
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 512Mi
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
