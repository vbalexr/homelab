---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: router-peer-config
  namespace: kube-system
spec:
  timers:
    connectRetryTimeSeconds: 3
    holdTimeSeconds: 90
    keepAliveTimeSeconds: 30
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 3
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          bgp-advertise: "enabled"
    - afi: ipv6
      safi: unicast
      advertisements:
        matchLabels:
          bgp-advertise: "enabled"
---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: bgp-cluster-config
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels: {}
  bgpInstances:
    - name: "default"
      localASN: 64513
      peers:
        - name: "router-ipv4"
          peerAddress: "10.1.0.1"
          peerASN: 64512
          peerConfigRef:
            name: router-peer-config
        - name: "router-ipv6"
          peerAddress: "fd7a:2201:1ab::1"
          peerASN: 64512
          peerConfigRef:
            name: router-peer-config
