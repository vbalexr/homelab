name: Check PostgreSQL and VectorChord Updates

on:
  schedule:
    # Run every Monday at 02:00 UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vbalexr/postgres

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # PostgreSQL version tracking removed - only PG_MAJOR_VERSION=16 is used in Dockerfile
      
      - name: Check VectorChord updates
        id: vc_check
        run: |
          # Get current VectorChord version from version.txt (trim whitespace)
          CURRENT_VC_VERSION=$(grep VECTORCHORD_VERSION containers/postgres/version.txt | cut -d= -f2 | xargs)
          echo "current_vc_version=${CURRENT_VC_VERSION}" >> $GITHUB_OUTPUT
          
          # Query GitHub API for latest VectorChord release
          LATEST_VC_VERSION=$(curl -s https://api.github.com/repos/tensorchord/vectorchord/releases/latest \
            | jq -r '.tag_name')
          
          echo "latest_vc_version=${LATEST_VC_VERSION}" >> $GITHUB_OUTPUT
          
          # Debug output
          echo "Comparing versions:"
          echo "  Current: '${CURRENT_VC_VERSION}'"
          echo "  Latest:  '${LATEST_VC_VERSION}'"
          
          if [ -z "${LATEST_VC_VERSION}" ] || [ "${LATEST_VC_VERSION}" = "null" ]; then
            echo "vectorchord_update_available=false" >> $GITHUB_OUTPUT
            echo "VectorChord: Could not fetch latest version from API"
          elif [ "${CURRENT_VC_VERSION}" != "${LATEST_VC_VERSION}" ]; then
            echo "vectorchord_update_available=true" >> $GITHUB_OUTPUT
            echo "VectorChord update available: ${CURRENT_VC_VERSION} -> ${LATEST_VC_VERSION}"
          else
            echo "vectorchord_update_available=false" >> $GITHUB_OUTPUT
            echo "VectorChord is up to date: ${CURRENT_VC_VERSION}"
          fi
      
      - name: Check pgvector updates
        id: pv_check
        run: |
          # Get current pgvector version from version.txt (trim whitespace)
          CURRENT_PV_VERSION=$(grep PGVECTOR_VERSION containers/postgres/version.txt | cut -d= -f2 | xargs)
          echo "current_pv_version=${CURRENT_PV_VERSION}" >> $GITHUB_OUTPUT
          
          # Query GitHub API for latest pgvector tag (pgvector uses tags, not releases)
          LATEST_PV_VERSION=$(curl -s https://api.github.com/repos/pgvector/pgvector/tags \
            | jq -r '.[0].name' | sed 's/^v//')
          
          echo "latest_pv_version=${LATEST_PV_VERSION}" >> $GITHUB_OUTPUT
          
          # Debug output
          echo "Comparing versions:"
          echo "  Current: '${CURRENT_PV_VERSION}'"
          echo "  Latest:  '${LATEST_PV_VERSION}'"
          
          if [ -z "${LATEST_PV_VERSION}" ] || [ "${LATEST_PV_VERSION}" = "null" ]; then
            echo "pgvector_update_available=false" >> $GITHUB_OUTPUT
            echo "pgvector: Could not fetch latest version from API"
          elif [ "${CURRENT_PV_VERSION}" != "${LATEST_PV_VERSION}" ]; then
            echo "pgvector_update_available=true" >> $GITHUB_OUTPUT
            echo "pgvector update available: ${CURRENT_PV_VERSION} -> ${LATEST_PV_VERSION}"
          else
            echo "pgvector_update_available=false" >> $GITHUB_OUTPUT
            echo "pgvector is up to date: ${CURRENT_PV_VERSION}"
          fi
      
      - name: Update version.txt if updates available
        id: update_versions
        if: |
          steps.vc_check.outputs.vectorchord_update_available == 'true' ||
          steps.pv_check.outputs.pgvector_update_available == 'true'
        run: |
          # Get current PG_MAJOR_VERSION to preserve it
          PG_MAJOR_VERSION=$(grep PG_MAJOR_VERSION containers/postgres/version.txt | cut -d= -f2)
          
          # Create new version.txt content
          cat > containers/postgres/version.txt << EOF
          PG_MAJOR_VERSION=${PG_MAJOR_VERSION}
          PGVECTOR_VERSION=${{ steps.pv_check.outputs.latest_pv_version }}
          VECTORCHORD_VERSION=${{ steps.vc_check.outputs.latest_vc_version }}
          BUILD_DATE=$(date -u +%Y-%m-%d)
          EOF
          
          echo "versions_updated=true" >> $GITHUB_OUTPUT
      
      - name: Close previous PR if exists
        if: steps.update_versions.outputs.versions_updated == 'true'
        run: |
          # Find and close any existing PR on the update branch
          PR_NUMBER=$(gh pr list \
            --base main \
            --head chore/update-postgres-deps \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -n "$PR_NUMBER" ]; then
            echo "Closing existing PR #$PR_NUMBER"
            gh pr close "$PR_NUMBER" --delete-branch
          else
            echo "No existing PR found to close"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create Pull Request
        if: steps.update_versions.outputs.versions_updated == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(postgres): update container dependency versions
            
            - pgvector: ${{ steps.pv_check.outputs.current_pv_version }} -> ${{ steps.pv_check.outputs.latest_pv_version }}
            - VectorChord: ${{ steps.vc_check.outputs.current_vc_version }} -> ${{ steps.vc_check.outputs.latest_vc_version }}
            
            [skip ci]
          branch: chore/update-postgres-deps
          delete-branch: true
          title: "chore(postgres): update container dependency versions"
          body: |
            ## Dependency Updates
            
            ### pgvector
            - Current: `${{ steps.pv_check.outputs.current_pv_version }}`
            - Latest: `${{ steps.pv_check.outputs.latest_pv_version }}`
            
            ### VectorChord
            - Current: `${{ steps.vc_check.outputs.current_vc_version }}`
            - Latest: `${{ steps.vc_check.outputs.latest_vc_version }}`
            
            Automatically generated by GitHub Actions.
          labels: |
            dependencies
            automated
          assignees: akaki
      
      - name: Summary
        run: |
          echo "## Dependency Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### pgvector" >> $GITHUB_STEP_SUMMARY
          echo "- Current: ${{ steps.pv_check.outputs.current_pv_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: ${{ steps.pv_check.outputs.latest_pv_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Update Available: ${{ steps.pv_check.outputs.pgvector_update_available }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### VectorChord" >> $GITHUB_STEP_SUMMARY
          echo "- Current: ${{ steps.vc_check.outputs.current_vc_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: ${{ steps.vc_check.outputs.latest_vc_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Update Available: ${{ steps.vc_check.outputs.vectorchord_update_available }}" >> $GITHUB_STEP_SUMMARY
