name: Build PostgreSQL with VectorChord Image

on:
  push:
    branches:
      - main
    paths:
      - 'containers/postgres/**'
      - '.github/workflows/build-postgres-image.yml'
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vbalexr/postgres

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Clear Docker Buildx cache
        run: docker buildx prune -af
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Generate date tag
        id: date
        run: echo "date_tag=$(date +%Y%m%d.%H%M)" >> $GITHUB_OUTPUT
      
      - name: Read versions from version.txt
        id: versions
        run: |
          echo "pg_major_version=$(grep PG_MAJOR_VERSION containers/postgres/version.txt | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "pgvector_version=$(grep PGVECTOR_VERSION containers/postgres/version.txt | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "vectorchord_version=$(grep VECTORCHORD_VERSION containers/postgres/version.txt | cut -d= -f2)" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: containers/postgres
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.date.outputs.date_tag }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            PG_MAJOR_VERSION=${{ steps.versions.outputs.pg_major_version }}
            PGVECTOR_VERSION=${{ steps.versions.outputs.pgvector_version }}
            VECTORCHORD_VERSION=${{ steps.versions.outputs.vectorchord_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
